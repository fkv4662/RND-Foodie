<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Rational Fridge Monitoring</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 2em; background: #f7f7f7; }
    h1 { color: #2a4d69; }
    form, .logs, .alerts { background: #fff; padding: 1em; margin-bottom: 2em; border-radius: 8px; box-shadow: 0 2px 8px #0001; }
    label { display: block; margin: 0.5em 0; }
    input { margin-left: 1em; }
    table { width: 100%; border-collapse: collapse; margin-top: 1em; }
    th, td { border: 1px solid #ccc; padding: 0.5em; text-align: center; }
    th { background: #e3e3e3; }
    .alert-row { background: #ffeaea; }
  </style>
</head>
<body>
  <h1>Rational Fridge Monitoring</h1>
  <form id="fridgeForm">
    <label>Device Name: <input type="text" name="device_name" required></label>
    <label>Temperature (°C): <input type="number" name="temperature" required></label>
    <label>Humidity (%): <input type="number" name="humidity" required></label>
    <button type="submit">Submit Log</button>
  </form>
  <div id="formResult"></div>


  <div>
    <button id="showLogsBtn">Show All Logs</button>
    <button id="showAlertsBtn">Show Alerts Only</button>
  </div>

  <div class="logs" id="logsSection">
    <h2>All Fridge Logs</h2>
    <table id="logsTable">
      <thead>
        <tr><th>Device</th><th>Temperature (°C)</th><th>Humidity (%)</th><th>Status</th><th>Recorded At</th></tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

  <div class="alerts" id="alertsSection" style="display:none;">
    <h2>Alerts Only</h2>
    <table id="alertsTable">
      <thead>
        <tr><th>Device</th><th>Temperature (°C)</th><th>Humidity (%)</th><th>Status</th><th>Recorded At</th></tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

  <script>
    async function fetchLogs() {
      const res = await fetch('/api/fridge/logs');
      const logs = await res.json();
      const tbody = document.querySelector('#logsTable tbody');
      tbody.innerHTML = '';
      logs.forEach(log => {
        const tr = document.createElement('tr');
        if (log.status === 'ALERT') tr.className = 'alert-row';
        tr.innerHTML = `<td>${log.device_name}</td><td>${log.temperature}</td><td>${log.humidity}</td><td>${log.status}</td><td>${log.recorded_at}</td>`;
        tbody.appendChild(tr);
      });
    }
    async function fetchAlerts() {
      const res = await fetch('/api/fridge/alerts');
      const logs = await res.json();
      const tbody = document.querySelector('#alertsTable tbody');
      tbody.innerHTML = '';
      logs.forEach(log => {
        const tr = document.createElement('tr');
        tr.innerHTML = `<td>${log.device_name}</td><td>${log.temperature}</td><td>${log.humidity}</td><td>${log.status}</td><td>${log.recorded_at}</td>`;
        tbody.appendChild(tr);
      });
    }
    document.getElementById('fridgeForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      const form = e.target;
      const data = {
        device_name: form.device_name.value,
        temperature: parseFloat(form.temperature.value),
        humidity: parseFloat(form.humidity.value)
      };
      const res = await fetch('/api/fridge/log', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
      });
      const result = await res.json();
      document.getElementById('formResult').textContent = JSON.stringify(result, null, 2);
      fetchLogs();
      fetchAlerts();
      form.reset();
    });
    // Toggle logic
    document.getElementById('showLogsBtn').onclick = function() {
      document.getElementById('logsSection').style.display = '';
      document.getElementById('alertsSection').style.display = 'none';
    };
    document.getElementById('showAlertsBtn').onclick = function() {
      document.getElementById('logsSection').style.display = 'none';
      document.getElementById('alertsSection').style.display = '';
    };

    // Initial load
    fetchLogs();
    fetchAlerts();
  </script>
</body>
</html>
